<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaWallet Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>NovaWallet</h1>

<div class="balance-card">
    <p>Available Balance</p>
    <h2>$30,000.00</h2>
</div>

<div class="actions">
    <button>Send</button>
    <button>Receive</button>
    <button>Deposit</button>
</div>

<div class="transactions">
    <h3>Recent Transactions</h3>

    <div class="tx">
        <span>Deposit</span>
        <span>+$500</span>
    </div>

    <div class="tx">
        <span>Transfer</span>
        <span>-$100</span>
    </div>

    <div class="tx">
        <span>Payment</span>
        <span>-$50</span>
    </div>

</div>

<a href="profile.html">
    <button class="profile-btn">Profile</button>
</a>

</div>

</body>
</html>
